# ============================================================
# DailyTaskMod — Build & Release 工作流
# 触发方式:
#   push / PR → 仅编译验证 + 上传构件
#   workflow_dispatch (手动输入版本号) → 编译 + 创建 Release
# ============================================================

name: Build & Release

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: "Release 版本号 (例如 1.0.0)"
        required: true
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Compile Mod
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DailyTaskMod
    outputs:
      version: ${{ steps.resolve-version.outputs.version }}
      is_release: ${{ steps.resolve-version.outputs.is_release }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 6.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Build Release (CI mode, no Stardew Valley installed)
        run: dotnet build -c Release -p:IgnoreModBuildConfigGamePath=true -v n

      - name: Resolve version
        id: resolve-version
        shell: pwsh
        run: |
          $isRelease = "${{ github.event_name }}" -eq "workflow_dispatch"
          if ($isRelease) {
            $version = "${{ inputs.version }}"
          } else {
            $shortSha = "${{ github.sha }}".Substring(0, 7)
            $version = "ci-$shortSha"
          }
          echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          echo "is_release=$isRelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Package mod zip (DLL + manifest + i18n)
        shell: pwsh
        run: |
          # Staging directory for a clean mod package
          $staging = "../staging/DailyTaskMod"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null

          # Copy build output (DLL + dependencies)
          Copy-Item -Path "bin/Release/net6.0/*" -Destination $staging -Recurse -Force

          # Ensure manifest.json and i18n are included
          if (-not (Test-Path "$staging/manifest.json")) {
            Copy-Item -Path "manifest.json" -Destination $staging
          }
          if (-not (Test-Path "$staging/i18n")) {
            Copy-Item -Path "i18n" -Destination $staging -Recurse
          }

          $zipName = "DailyTaskMod-${{ steps.resolve-version.outputs.version }}.zip"
          Compress-Archive -Path "$staging/*" -DestinationPath "../$zipName" -Force
          echo "PACKAGE_ZIP=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload raw build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyTaskMod-${{ steps.resolve-version.outputs.version }}
          path: DailyTaskMod/bin/Release/net6.0/
          if-no-files-found: error

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyTaskMod-${{ steps.resolve-version.outputs.version }}-zip
          path: DailyTaskMod-*.zip
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.is_release == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download built zip
        uses: actions/download-artifact@v4
        with:
          name: DailyTaskMod-${{ needs.build.outputs.version }}-zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: DailyTaskMod v${{ needs.build.outputs.version }}
          body: |
            Daily Task Automation 模组 v${{ needs.build.outputs.version }}

            ## 安装方法
            1. 安装 SMAPI 3.15+
            2. 下载本 Release 的 zip 附件
            3. 解压到 Stardew Valley/Mods/ 目录
            4. 启动游戏，按 K 键执行日常任务

            ## 功能
            - 💧 自动浇灌（跳过洒水器）
            - 🌾 自动收获（含花卉/再生作物）
            - 🐄 自动抚摸 + 收集动物产品 + 喂养
            - ⚙️ 自动收集所有机器产出（16种）
            - 🌳 果树 + 树液采集器
            - 🌿 采集品拾取 + 清理
            - 💝 社交（生日送礼/摸宠物/配偶）
            - 📺 杂项（电视/鱼塘/山洞/史莱姆球）
          files: DailyTaskMod-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
